<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="utf-8">
        <title>Трансоформация и анимация</title>
        <link rel="stylesheet" href="CSS/style.css">
        <script src="http://d3js.org/d3.v7.min.js"></script>
        <script src="JavaScript/image.js"></script>
        <script src="JavaScript/path.js"></script>
        <script src="JavaScript/main.js"></script>
    </head>
    <body>
        <form id="settings" style="display: grid; grid-template-rows: repeat(3, auto); grid-template-columns: repeat(3, auto);">
            <p style="grid-column: 1 / 2;" id="coordsModP"><strong>Координаты рисунка</strong><br>
                <label for="cx">x: </label>
                <input type="number" id="cx" name="cx" value="300" min="0" max="600">
                <span id="cx_f">
                    <label for="cx_finish">до </label>
                    <input type="number" id="cx_finish" name="cx_finish" value="550" min="0" max="600">
                </span>
                <br>
                <label for="cy">y: </label>
                <input type="number" id="cy" name="cy" value="300" min="0" max="600">
                <span id="cy_f">
                    <label for="cy_finish">до </label>
                    <input type="number" id="cy_finish" name="cy_finish" value="550" min="0" max="600">
                </span>
            </p>

            <p style="grid-column: 1 / 2;" id="wayModP"><strong>Путь перемещения</strong><br>
                <select id="selectWay">
                    <option value="letter">Буквой «Г»</option>
                    <option value="circle">По кругу</option>
                </select>
            </p>

            <p style="grid-column: 2 / 3;" id="scaleP"><strong>Масштаб</strong><br>
                <label for="mx">по x: </label>
                <input type="number" id="mx" name="mx" value="1" min="0.1" max="10">
                <span id="mx_f">
                    <label for="mx_finish">до </label>
                    <input type="number" id="mx_finish" name="mx_finish" value="1.5" min="0.1" max="10"><br>
                </span>
                <br>
                <label for="my">по y: </label>
                <input type="number" id="my" name="my" value="1" min="0.1" max="10">
                <span id="my_f">
                    <label for="my_finish">до </label>
                    <input type="number" id="my_finish" name="my_finish" value="1.5" min="0.1" max="10"><br>
                </span>
            </p>
            <p style="grid-column: 3 / 4;" id="rotateP"><strong>Поворот</strong><br>
                <label for="rotate">угол: </label>
                <input type="number" id="rotate" name="rotate" value="0" min="0" max="360">
                <span id="rotate_f">
                    <label for="rotate_finish">до </label>
                    <input type="number" id="rotate_finish" name="rotate_finish" value="180" min="0" max="360">
                </span>           
            </p>
            <p style="grid-row: 2 / 3; grid-column: 1 / 2;">
                <input type="button" value="Нарисовать" id="pictButton">
                <input type="button" value="Очистить" id="clrButton">
            </p>
            <div style="grid-row: 3 / 4;">
                <input type="checkbox" id="animationSwitch" name="animationSwitch" value="on">
                <label for="animationSwitch">Включить анимацию?</label>
                <select id="selectAnimation" style="grid-row: 3 / 4; width: 5vw;">
                    <option value="Linear">linear</option>
                    <option value="Elastic">elastic</option>
                    <option value="Bounce">bounce</option>
                </select>
                <div id="wayMod">
                    <input type="checkbox" id="waySwitch" name="waySwitch" value="on">
                    <label for="waySwitch">Перещемение вдоль пути?</label>
                </div>
                <br><input type="button" value="Анимировать" id="animateButton">
            </div>

        </form>

        <svg></svg>

    </body>
</html>
