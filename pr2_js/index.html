<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="utf-8">
        <title>Практическая 2</title>
        <script src="http://d3js.org/d3.v7.min.js"></script>
        <script src="JavaScript/picture.js"></script>
        <script src="JavaScript/path.js"></script>
        <script src="JavaScript/main.js"></script>
    </head>

    <body>
        <form id="settings" style="display: grid; grid-template-rows: repeat(2, auto); grid-template-columns: repeat(3, auto); margin: 1.2vmax;">
            <div style="grid-row: 1 / 2; align-self: center;">
                <label for="timeInput">Длительность анимации, мс: </label>
                <input type="number" id="animDurationInputMillis" name="animDurationInputMillis" min="0" max="10000" value="5000">
            </div>
            <div style="grid-row: 1 / 2; grid-column: 2 / 3;">
                <label for="scaleXBegin">Масштаб X: от</label>
                <input type="number" id="scaleXBegin" name="scaleXBegin" min="-10" max="10" value="1">
                <label for="scaleXEnd">до:</label>
                <input type="number" id="scaleXEnd" name="scaleXEnd" min="-10" max="10" value="1">
                <br><br>
                <label for="scaleYBegin">Масштаб Y: от</label>
                <input type="number" id="scaleYBegin" name="scaleYBegin" min="-10" max="10" value="1">
                <label for="scaleYEnd">до:</label>
                <input type="number" id="scaleYEnd" name="scaleYEnd" min="-10" max="10" value="1">
            </div>
            <div style="grid-row: 1 / 2; grid-column: 3 / 4;">
                <label for="rotateBegin">Поворот: от</label>
                <input type="number" id="rotateBegin" name="rotateBegin" min="0" max="360" value="0">
                <label for="rotateEnd">до:</label>
                <input type="number" id="rotateEnd" name="rotateEnd" min="0" max="360" value="360">        
            </div>
            <div style="grid-row: 2 / 3; grid-column: 1 / 2; padding: 1vmax;">
                <input type="button" value="Начать анимацию" id="animationButton">
                <input type="button" value="Очистить" id="clearSvgButton">
            </div>
        </form>

        <svg></svg>

    </body>
</html>
